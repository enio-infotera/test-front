services:
  mock-api:
    build:
      context: ./mock-api
    ports:
      - "3333:3333"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3333
    ports:
      - "3000:3000"
    depends_on:
      - mock-api
    restart: unless-stopped
